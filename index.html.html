                document.getElementById("game-content").innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <h3>⚠️ 场景加载失败</h3>
                        <p>游戏数据出错，请重新开始</p>
                        <button class="restart-btn" onclick="restartGame()">重新开始</button>
                    </div>
                `;
                return;
            }
            
            gameData.currentScene = sceneId;
            const contentDiv = document.getElementById("game-content");
            
            // 构建场景HTML
            let html = `
                <div class="scene-title">${scene.title}</div>
                <div class="scene-content">${scene.content}</div>
            `;
            
            // 显示当前分数
            if (gameData.character) {
                html += `<div class="score-display">当前信念值: ${gameData.score}</div>`;
            }
            
            // 添加选择按钮
            if (scene.choices && scene.choices.length > 0) {
                html += '<div class="choices-container"><h3>请做出选择：</h3>';
                scene.choices.forEach(choice => {
                    const safeText = choice.text.replace(/'/g, "\\'");
                    const weightKey = choice.weightKey ? `'${choice.weightKey}'` : 'null';
                    html += `
                        <button class="choice-btn" onclick="handleChoice('${choice.action}', ${weightKey}, '${safeText}')">
                            ${choice.text}
                        </button>
                    `;
                });
                html += '</div>';
            }
            
            contentDiv.innerHTML = html;
        }

        function selectCharacter(char) {
            gameData.character = char;
            loadScene(char);
        }

        function handleChoice(action, weightKey, text) {
            // 记录选择
            gameData.choices.push({ text, action, weightKey });
            
            // 计算分数
            if (weightKey && weightKey !== 'null' && gameData.choiceWeights[weightKey] !== undefined) {
                const score = gameData.choiceWeights[weightKey];
                gameData.score += score;
                console.log(`选择: ${text}, 权重: ${weightKey}, 得分: ${score}, 总分: ${gameData.score}`);
            } else if (weightKey && weightKey !== 'null') {
                console.error(`权重键未找到: ${weightKey}`);
            }
            
            // 处理特殊动作
            if (action === "calculateEnding") {
                calculateEnding();
            } else {
                loadScene(action);
            }
        }

        function calculateEnding() {
            const char = gameData.character;
            const score = gameData.score;
            
            console.log(`计算结局: 角色=${char}, 总分=${score}, 结局选项:`, gameData.endings[char]);
            
            if (!char) {
                document.getElementById("game-content").innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <h3>⚠️ 结局计算失败</h3>
                        <p>未选择角色，无法计算结局</p>
                        <button class="restart-btn" onclick="restartGame()">重新开始</button>
                    </div>
                `;
                return;
            }
            
            // 获取该角色的结局列表
            const charEndings = gameData.endings[char];
            if (!charEndings) {
                document.getElementById("game-content").innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <h3>⚠️ 结局数据错误</h3>
                        <p>请重新开始游戏</p>
                        <button class="restart-btn" onclick="restartGame()">重新开始</button>
                    </div>
                `;
                return;
            }
            
            // 根据分数确定结局
            let ending = charEndings[charEndings.length - 1]; // 默认最低分结局
            for (let i = 0; i < charEndings.length; i++) {
                console.log(`检查结局 ${charEndings[i].name}: min=${charEndings[i].min}, max=${charEndings[i].max}, score=${score}`);
                if (score >= charEndings[i].min && score <= charEndings[i].max) {
                    ending = charEndings[i];
                    break;
                }
            }
            
            console.log(`确定结局: ${ending.name}, 分数范围: ${ending.min}-${ending.max}, 当前分数: ${score}`);
            
            // 显示结局
            showEnding(ending);
        }

        function showEnding(ending) {
            const contentDiv = document.getElementById("game-content");
            
            const html = `
                <div class="ending-container">
                    <div class="ending-title">🎖️ 你的结局：${ending.name} 🎖️</div>
                    <div class="score-display">最终信念值: ${gameData.score}</div>
                    <div class="ending-description">
                        <p>${ending.desc}</p>
                        <div class="ending-detail">${ending.detail}</div>
                        <div class="historical-note">
                            <strong>📚 历史启示：</strong><br>
                            你的结局是那个时代无数普通人命运的一个缩影。在土地革命和长征的洪流中，每个人都面临着艰难的抉择。这些选择塑造了历史，也定义了人生。无论结局如何，重要的是在历史的十字路口，你做出了自己的选择，承担了相应的后果。这就是成长，这就是历史，这就是人生。
                        </div>
                        <div style="margin-top: 20px;">
                            <button class="restart-btn" onclick="restartGame()">重新开始游戏</button>
                        </div>
                    </div>
                </div>
            `;
            
            contentDiv.innerHTML = html;
        }

        function restartGame() {
            // 重置游戏数据
            gameData.currentScene = "home";
            gameData.score = 0;
            gameData.choices = [];
            gameData.character = null;
            
            // 重新加载首页
            loadScene("home");
        }

        // 初始化游戏
        window.onload = function() {
            loadScene("home");
        };
    </script>
</body>
</html>
